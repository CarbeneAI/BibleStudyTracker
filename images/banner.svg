<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>

    <!-- Glass panel gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>

    <!-- Purple glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Progress bar gradient -->
    <linearGradient id="progressFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <!-- Book page gradient -->
    <linearGradient id="pageLeft" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e8e0f0"/>
      <stop offset="100%" stop-color="#d4c8e8"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8e0f0"/>
      <stop offset="100%" stop-color="#d4c8e8"/>
    </linearGradient>

    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for accents -->
    <filter id="accentGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="noisy"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(80,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(160,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(320,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(400,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(480,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(560,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(640,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(720,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(800,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(880,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(960,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(1040,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(1120,0)" />
    <line x1="0" y1="0" x2="0" y2="640" stroke="#a78bfa" stroke-width="0.5" transform="translate(1200,0)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,80)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,160)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,240)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,320)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,400)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,480)" />
    <line x1="0" y1="0" x2="1280" y2="0" stroke="#a78bfa" stroke-width="0.5" transform="translate(0,560)" />
  </g>

  <!-- Ambient glow behind book -->
  <ellipse cx="640" cy="310" rx="320" ry="200" fill="url(#glow)"/>

  <!-- Glass morphism card -->
  <rect x="140" y="80" width="1000" height="480" rx="24" ry="24"
        fill="url(#glass)"
        stroke="rgba(167,139,250,0.15)"
        stroke-width="1"/>

  <!-- Open Book Icon -->
  <g transform="translate(640, 260)" filter="url(#softShadow)">
    <!-- Book spine -->
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#483699" stroke-width="3" opacity="0.8"/>

    <!-- Left page -->
    <path d="M-5,-55 L-5,-55 Q-85,-55 -95,-45 L-95,45 Q-85,55 -5,55 L-5,-55 Z"
          fill="url(#pageLeft)" opacity="0.9"/>
    <!-- Left page lines -->
    <line x1="-80" y1="-35" x2="-15" y2="-35" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="-80" y1="-20" x2="-15" y2="-20" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="-80" y1="-5" x2="-15" y2="-5" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="-80" y1="10" x2="-15" y2="10" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="-80" y1="25" x2="-50" y2="25" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>

    <!-- Right page -->
    <path d="M5,-55 L5,-55 Q85,-55 95,-45 L95,45 Q85,55 5,55 L5,-55 Z"
          fill="url(#pageRight)" opacity="0.9"/>
    <!-- Right page lines -->
    <line x1="15" y1="-35" x2="80" y2="-35" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-20" x2="80" y2="-20" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="-5" x2="80" y2="-5" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="10" x2="80" y2="10" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>
    <line x1="15" y1="25" x2="45" y2="25" stroke="#9b8cb8" stroke-width="1" opacity="0.4"/>

    <!-- Checkmark on right page -->
    <g transform="translate(55, -5)" filter="url(#accentGlow)">
      <polyline points="-8,2 -3,8 8,-6" stroke="#7c3aed" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Progress bar under book -->
  <g transform="translate(640, 355)">
    <!-- Track -->
    <rect x="-120" y="-6" width="240" height="12" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(167,139,250,0.2)" stroke-width="0.5"/>
    <!-- Fill (73% progress) -->
    <rect x="-120" y="-6" width="175" height="12" rx="6" fill="url(#progressFill)" filter="url(#accentGlow)"/>
    <!-- Percentage -->
    <text x="135" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a78bfa" font-weight="600">73%</text>
  </g>

  <!-- Title -->
  <text x="640" y="430" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Bible Study Tracker
  </text>

  <!-- Subtitle -->
  <text x="640" y="470" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="20" fill="#a78bfa" font-weight="400" letter-spacing="2" opacity="0.85">
    TRACK YOUR READING JOURNEY
  </text>

  <!-- Bottom accent line -->
  <line x1="540" y1="495" x2="740" y2="495" stroke="url(#progressFill)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

  <!-- Obsidian badge - bottom left -->
  <g transform="translate(220, 530)" opacity="0.5">
    <rect x="-30" y="-12" width="120" height="24" rx="12" fill="rgba(72,54,153,0.3)" stroke="rgba(167,139,250,0.2)" stroke-width="0.5"/>
    <text x="30" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" font-weight="500">for Obsidian</text>
  </g>

  <!-- CarbeneAI badge - bottom right -->
  <g transform="translate(1000, 530)" opacity="0.5">
    <rect x="-40" y="-12" width="140" height="24" rx="12" fill="rgba(72,54,153,0.3)" stroke="rgba(167,139,250,0.2)" stroke-width="0.5"/>
    <text x="30" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a78bfa" font-weight="500">by CarbeneAI</text>
  </g>

  <!-- Corner decorations -->
  <path d="M160,100 L160,120 M160,100 L180,100" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M1120,100 L1120,120 M1120,100 L1100,100" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M160,540 L160,520 M160,540 L180,540" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M1120,540 L1120,520 M1120,540 L1100,540" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>